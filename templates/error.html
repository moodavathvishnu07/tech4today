<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Codly Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('codly-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body class="error-page">
    <header>
        <div class="logo-section">
            <h1><a href="/" style="text-decoration: none; color: inherit;">Cod<span>ly</span></a></h1>
        </div>
    </header>

    <main style="max-width: 600px; margin: 10rem auto; text-align: center; padding: 0 2rem;">
        <div style="font-size: 5rem; font-weight: 900; color: var(--text-primary); margin-bottom: 2rem;">!</div>
        <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 1rem;">{{ title }}</h1>
        <p style="font-size: 1.25rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 3rem;">{{ message }}</p>
        <a href="/" style="display: inline-block; background: var(--text-primary); color: var(--bg-main); padding: 1rem 2.5rem; text-decoration: none; border-radius: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;">Back to Pulse Hub</a>
    </main>

    <footer style="position: fixed; bottom: 4rem; width: 100%; text-align: center; opacity: 0.5;">
        <div style="font-size: 0.7rem; font-weight: 900; text-transform: uppercase;">Codly Core Error Intelligence</div>
    </footer>
</body>
</html>
